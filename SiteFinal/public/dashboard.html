<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="sidebar">
        <div class="logoSide">
            <img src="./img/broto.png">
            <h1>Collect Tech</h1>
            <p>Smart City Solution</p>
        </div>

        <ul class="menu">
            <li class="ativo">Geral</li>
            <li>Lixeiras</li>
            <li>Rotas</li>
        </ul>
    </div>
    <div class="graficos">
        <div>
            <div class="container">
                <div class="kpi">
                    <div class="box_lixeiras total">
                        <div>
                            <p> Total de lixeiras:</p>
                            <h3>20</h3>
                            <h6>no sistema</h6>
                        </div>
                        <div class="container_icone icone_total">
                            <img src="./img/lixeira.png" class="icone_box">
                        </div>
                    </div>
                    <div class="box_lixeiras vazia">
                        <div>
                            <p> Nivel Baixo:</p>
                            <h3>4</h3>
                            <h6>0-50% cheias</h6>
                        </div>
                        <div class="container_icone icone_vazia">
                            <img src="./img/sorrindo.png" class="icone_box">
                        </div>
                    </div>
                </div>
                <div class="kpi">
                    <div class="box_lixeiras medio">
                        <div>
                            <p> Nivel Médio:</p>
                            <h3>8</h3>
                            <h6>50-80% cheias</h6>
                        </div>
                        <div class="container_icone icone_medio">
                            <img src="./img/feliz.png" class="icone_box">
                        </div>
                    </div>
                    <div class="box_lixeiras cheia">
                        <div>
                            <p> Nivel Alto:</p>
                            <h3>8</h3>
                            <h6>80%+ cheias</h6>
                        </div>
                        <div class="container_icone icone_cheia">
                            <img src="./img/triste.png" class="icone_box">
                        </div>
                    </div>
                </div>
            </div>
            <div class="container">
                <canvas id="graf_barras_bairros" class="graf_barras"></canvas>
            </div>
        </div>

        <div class="container roscas">
            <button class="botao_graf" onclick="belaVista()">
                <span>Bela Vista</span>
                <canvas id="graf_bela_vista" class="graf_rosca"></canvas>
            </button>
            <button class="botao_graf" onclick="se()">
                <span>Sé</span>
                <canvas id="graf_se" class="graf_rosca"></canvas>
            </button>
            <button class="botao_graf" onclick="liberdade()">
                <span>Liberdade</span>
                <canvas id="graf_liberdade" class="graf_rosca"></canvas>
            </button>
            <button class="botao_graf" onclick="cambuci()">
                <span>Cambuci</span>
                <canvas id="graf_cambuci" class="graf_rosca"></canvas>
            </button>
            </button>
</body>

</html>
<script>
    Chart.defaults.backgroundColor = '#12A454'

    const barras_bairros = document.getElementById('graf_barras_bairros');

    new Chart(barras_bairros, {
        type: 'bar',
        data: {
            labels: ['Média das lixeiras do bairro'],
            datasets: [{
                label: 'Bela Vista',
                data: [12],
            },
            {
                label: 'Sé',
                data: [76],
            },
            {
                label: 'Liberdade',
                data: [65],
            },
            {
                label: 'Cambuci',
                data: [32],
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true,
                    suggestedMax: 100
                }
            },
        }
    });

    const graf_belaVista = document.getElementById('graf_bela_vista');

    new Chart(graf_belaVista, {
        type: 'doughnut',
        data: {
            labels: ['Nivel Alto', 'Nivel Medio', 'Nivel Alto'],
            datasets: [{
                data: [3, 1, 1],
                borderWidth: 1
            }]
        },
        options: {
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });

    const graf_se = document.getElementById('graf_se');

    new Chart(graf_se, {
        type: 'doughnut',
        data: {
            labels: ['Nivel Alto', 'Nivel Medio', 'Nivel Alto'],
            datasets: [{
                data: [1, 2, 2],
                borderWidth: 1
            }]
        },
        options: {
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });

    const graf_liberdade = document.getElementById('graf_liberdade');

    new Chart(graf_liberdade, {
        type: 'doughnut',
        data: {
            labels: ['Nivel Alto', 'Nivel Medio', 'Nivel Alto'],
            datasets: [{
                data: [3, 2, 0],
                borderWidth: 1
            }]
        },
        options: {
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });

    const graf_cambuci = document.getElementById('graf_cambuci');

    new Chart(graf_cambuci, {
        type: 'doughnut',
        data: {
            labels: ['Nivel Alto', 'Nivel Medio', 'Nivel Alto'],
            datasets: [{
                data: [1, 3, 1],
                borderWidth: 1
            }]
        },
        options: {
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });


    function belaVista() {
        barras_bairros.data.labels.pop()
        barras_bairros.data.datasets.forEach((dataset) => {dataset.data.pop()})
        barras_bairros.data.labels.push('Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab', 'Dom')
        barras_bairros.data.datasets.forEach((dataset) => {dataset.data.push(12)})
        barras_bairros.update()
    }
</script>
