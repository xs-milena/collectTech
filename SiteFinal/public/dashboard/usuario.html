<script>
    function buscarDadosPorNome() {

        let nomeDaBusca = ipt_usuario.value;
        let emailDaBusca = ipt_email_usuario.value;

        if (nomeDaBusca == "" || emailDaBusca == "") {
            alert("Por favor, digite um nome e um email para buscar.");
            return;
        }

        fetch(`/usuarios/buscarDados?nome=${nomeDaBusca}&email=${emailDaBusca}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
            },
        })
        .then(function (resposta) {
            if (resposta.ok) {
                resposta.json().then(function(dados) {//nomeia como dados
                    console.log("Funcionário encontrado:", dados);
                   
                    ipt_nome.value = dados.nome;
                    ipt_email.value = dados.email;
                    ipt_telefone.value = dados.telefone;
                    ipt_cargo.value = dados.cargo;
                    ipt_codigo.value = dados.codigo;
                    ipt_situacao_funcionario.value = dados.situacao;
                });
            } else {
                console.error("Funcionário não encontrado ou erro no servidor.");
                alert("Funcionário não encontrado.");
            }
        })
        .catch(function (erro) {
            console.error("Erro de rede:", erro);
        });
    }

   
</script>
