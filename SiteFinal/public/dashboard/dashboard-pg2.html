<script>
    let lixeiras = []
    let mostrou = false

    window.onload = exibirEcopontosDoUsuario();

    function exibirEcopontosDoUsuario() {
        var ecopontos = JSON.parse(sessionStorage.ECOPONTOS);
        ecopontos.forEach(item => {
            obterDadosGrafico(item.id_ecoponto)
        });
    }

    function exibirEcopontos(id_ecoponto) {
        let todosOsGraficos = JSON.parse(sessionStorage.ECOPONTOS);
    }

    // O gráfico é construído com três funções:
    // 1. obterDadosGrafico -> Traz dados do Banco de Dados para montar o gráfico da primeira vez
    // 2. plotarGrafico -> Monta o gráfico com os dados trazidos e exibe em tela
    // 3. atualizarGrafico -> Atualiza o gráfico, trazendo novamente dados do Banco

    // Esta função *obterDadosGrafico* busca os últimos dados inseridos em tabela de medidas.
    // para, quando carregar o gráfico da primeira vez, já trazer com vários dados.
    // A função *obterDadosGrafico* também invoca a função *plotarGrafico*

    //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
    //     Para ajustar o "select", ajuste o comando sql em src/models
    function obterDadosGrafico(id_ecoponto) {

        fetch(`/medidas/ultimas/${id_ecoponto}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    plotarGrafico(resposta, id_ecoponto);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    // Esta função *plotarGrafico* usa os dados capturados na função anterior para criar o gráfico
    // Configura o gráfico (cores, tipo, etc), materializa-o na página e, 
    // A função *plotarGrafico* também invoca a função *atualizarGrafico*
    function plotarGrafico(resposta, id_ecoponto) {
        if(mostrou == true){
            console.log('já mostrou')
            return
        }

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)
        lixeiras = resposta

        for (i = resposta.length-1; i >= 0; i--) {
            var registro = resposta[i];

            if(registro.nivel_preenchimento >= 80){
                div_kpis.innerHTML += `<div class="box_lixeiras1 cheia">
                        <div>
                        <span>Ecoponto ${registro.id_ecoponto}</span>
                        <p>${registro.nome_ecoponto}</p>
                        <h3>Lixeira: ${registro.id_lixeira}</h3>
                        <h5>Capacidade:</h5>
                        <div class="progresso-container">
                            <progress value="${registro.nivel_preenchimento}" max="100"></progress><span>${registro.nivel_preenchimento}</span>
                        </div>
                    </div>
                    <div class="container_icone icone_cheia">
                        <img src="../assets/img/lixeira.png" class="icone_box">
                    </div>
                    </div>`
            } else if (registro.nivel_preenchimento < 80 && registro.nivel_preenchimento >= 50){
                div_kpis.innerHTML += `<div class="box_lixeiras1 medio">
                        <div>
                        <span>Ecoponto ${registro.id_ecoponto}</span>
                        <p>${registro.nome_ecoponto}</p>
                        <h3>Lixeira: ${registro.id_lixeira}</h3>
                        <h5>Capacidade:</h5>
                        <div class="progresso-container">
                            <progress value="${registro.nivel_preenchimento}" max="100"></progress><span>${registro.nivel_preenchimento}</span>
                        </div>
                    </div>
                    <div class="container_icone icone_medio">
                        <img src="../assets/img/lixeira.png" class="icone_box">
                    </div>
                    </div>`
            } else {
                div_kpis.innerHTML += `<div class="box_lixeiras1 vazia">
                        <div>
                        <span>Ecoponto ${registro.id_ecoponto}</span>
                        <p>${registro.nome_ecoponto}</p>
                        <h3>Lixeira: ${registro.id_lixeira}</h3>
                        <h5>Capacidade:</h5>
                        <div class="progresso-container">
                            <progress value="${registro.nivel_preenchimento}" max="100"></progress><span>${registro.nivel_preenchimento}</span>
                        </div>
                    </div>
                    <div class="container_icone icone_vazia">
                        <img src="../assets/img/lixeira.png" class="icone_box">
                    </div>
                    </div>`
            }
            console.log(i, registro)
        }
        console.log(lixeiras)
        mostrou = true
    }

            }
            }

    }
