<script>
    function buscarDados() {
        let nomeDaBusca = ipt_usuario.value;
        let emailDaBusca = ipt_email_usuario.value;

        if (nomeDaBusca == "" || emailDaBusca == "") {
            alert("Por favor, digite um nome e um email para buscar.");
            return;
        }

        fetch(`/avisos/buscarDados?nome=${nomeDaBusca}&email=${emailDaBusca}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
            },
        })
            .then(function (resposta) {
                if (resposta.ok) {
                    resposta.json().then(function (dados) {
                        console.log("Funcionário encontrado:", dados);

                        ipt_nome.value = dados.nome;
                        ipt_email.value = dados.email;
                        ipt_telefone.value = dados.telefone;
                        ipt_cargo.value = dados.cargo;
                        ipt_codigo.value = dados.id_funcionario;
                        ipt_situacao_funcionario.value = dados.situacao_funcionario ? "Ativo" : "Inativo";
                    });
                } else {
                    console.error("Funcionário não encontrado ou erro no servidor.");
                    alert("Funcionário não encontrado.");
                }
            })
            .catch(function (erro) {
                console.error("Erro de rede:", erro);
            });
    }

    function editar() {
        let idFuncionario = ipt_codigo.value;

        if (!idFuncionario) {
            alert("Pesquise um usuário antes de tentar modificar.");
            return;
        }

        fetch(`/avisos/editar/${idFuncionario}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                codigo: ipt_codigo.value,
                nome: ipt_nome.value,
                email: ipt_email.value,
                telefone: ipt_telefone.value,
                cargo: ipt_cargo.value,
                situacao_funcionario: ipt_situacao_funcionario.value === "Ativo" ? 1 : 0
            })
        }).then(function (resposta) {

            if (resposta.ok) {
                console.log("Post atualizado com sucesso pelo usuario de email: " + sessionStorage.getItem("email_Funcionario") + "!");
                window.location = "/dashboard/gerenciarUsuario.html"
            } else if (resposta.status == 404) {
                window.alert("Deu 404!");
            } else {
                throw ("Houve um erro ao tentar realizar a postagem! Código da resposta: " + resposta.status);
            }
        }).catch(function (resposta) {
            console.log(`#ERRO: ${resposta}`);
        });
    }


    // deleta a pessoa?
function desativar() { // Removido o parâmetro duplicado
    let idFuncionario = ipt_codigo.value;
    
    if (!idFuncionario) {
        alert("Pesquise um usuário antes de tentar desativar.");

    console.log("ID capturado no clique do botão:", idFuncionario);

        fetch(`/avisos/desativar/${idFuncionario}`, {

            } else if (resposta.status == 404) {

            } else {

            }
        }).catch(function (resposta) {
            console.log(`#ERRO: ${resposta}`);
        });
    }
</script>
