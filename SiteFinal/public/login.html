<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Login</title>

  <script src="./JS/login.js"></script>
  <script src="./JS/sessao.js"></script>

  <link rel="stylesheet" href="style/login.css" />
  <link rel="icon" href="./assets/img/folha.png">

</head>

<body>

  
  <img class="logo" src="./assets/img/folha.png" alt="Logo" />
  <h1>Collect Tech</h1>
  <p class="subtitulo">Gestão Inteligente de Resíduos Urbanos</p>

  <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
  </div>

  <div id="formulario">
<div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
        </div>
        </div>
  <div id="campos">

  <div class="bloco-input-unico">
        <p>Código de ativação:</p>
        <input id="ipt_codigo" class="input" type="text" placeholder="Insira aqui seu código">
        <div id="div_codigo" class="erro"></div>
      </div>

      <div class="bloco-input-unico">
        <p>E-mail</p>
        <input id="ipt_email" class="input" type="email" placeholder="Seu@email.com" oninput="validarEmail()">
        <div id="div_email" class="erro"></div>
      </div>

      <div class="bloco-input-unico">
        <p>Senha</p>
        <input id="ipt_senha" class="input" type="password" placeholder="Mínimo 6 caracteres" oninput="validarSenha()">
        <div id="div_senha" class="erro"></div>
      </div>

    </div>

    <div id="botoes">
      <button type="button" onclick="entrar()" class="button login">Entrar</button>
      <!-- <div class="icone-texto">
        <a href="cadastro.html" class="button cadastro"> <img class="icon" src="./img/user2.png" /> Criar Cadastro</a>
      </div> -->
      <p class="link-esqueci">Esqueci a minha senha</p>
    </div>

    <div id="div_aguardar" class="loading-div">
      <img src="./assets/circle-loading.gif" id="loading-gif">
    </div>

    <div id="div_erros_login"></div>
  </div>
  <p class="rodape">São Paulo - SP • 2026</p>
</body>

</html>

<script>


    function entrar() {
        aguardar();

        var codigoVar = ipt_codigo.value;
        var idEmpresaVincular
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (codigoVar == "" || emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM CÓDIGO: ", codigoVar);
        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
      if (listaEmpresasCadastradas[i].codigo_ativacao == codigoVar) {
        idEmpresaVincular = listaEmpresasCadastradas[i].id_empresa
        console.log("Código de ativação válido.");
        break;
      } else {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Mensagem de erro para código inválido)";
        finalizarAguardar();
      }
    }

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                idEmpresaVincularServer: idEmpresaVincular,
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id_funcionario;
                    sessionStorage.ECOPONTOS = JSON.stringify(json.ecopontos)

                    setTimeout(function () {
                        window.location = "./dashboard/dashboard.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }


  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);

            console.log("listaEmpresasCadastradas")
            console.log(listaEmpresasCadastradas[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
