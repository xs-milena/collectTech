<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Login</title>

  <script src="./JS/login.js"></script>
  <script src="./JS/sessao.js"></script>

  <link rel="stylesheet" href="style/login.css" />
  <link rel="icon" href="./img/folha.png">

</head>

<body>

  
  <img class="logo" src="./img/folha.png" alt="Logo" />
  <h1>Collect Tech</h1>
  <p class="subtitulo">Gestão Inteligente de Resíduos Urbanos</p>

  <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
  </div>

  <div id="formulario">

  <div id="campos">

  <div class="bloco-input-unico">
        <p>Código de ativação:</p>
        <input id="codigo_input" class="input" type="text" placeholder="Insira aqui seu código">
      </div>

      <div class="bloco-input-unico">
        <p>E-mail</p>
        <input id="ipt_email" class="input" type="email" placeholder="Seu@email.com" oninput="email()">
      </div>

      <div class="bloco-input-unico">
        <p>Senha</p>
        <input id="ipt_senha" class="input" type="password" placeholder="Mínimo 6 caracteres" oninput="senha()">
      </div>

    </div>

    <div id="botoes">
      <button type="button" onclick="entrar()" class="button login">Entrar</button>
      <!-- <div class="icone-texto">
        <a href="cadastro.html" class="button cadastro"> <img class="icon" src="./img/user2.png" /> Criar Cadastro</a>
      </div> -->
      <p class="link-esqueci">Esqueci a minha senha</p>
    </div>

    <div id="div_aguardar" class="loading-div">
      <img src="./assets/circle-loading.gif" id="loading-gif">
    </div>

    <div id="div_erros_login"></div>
  </div>
  <p class="rodape">São Paulo - SP • 2026</p>
</body>

</html>
