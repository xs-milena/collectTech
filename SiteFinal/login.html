<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style/login.css"/>
  <title>Login</title>
</head>
<body>

  <img class="logo" src="./img/folha.png" alt="Logo"/>
  <h1>Collect Tech</h1>
  <p class="subtitulo">Gestão Inteligente de Resíduos Urbanos</p>
  
  <div id="formulario">
    <div id="campos">
      
      <div class="bloco-input-unico">
         <p>E-mail</p>
         <input id="ipt_email" class="input" type="email" placeholder="Seu@email.com">
      </div>
      
      <div class="bloco-input-unico">
         <p>Senha</p>
         <input id="ipt_senha" class="input" type="password" placeholder="Mínimo 6 caracteres">
      </div>
      
    </div>
    
    <div id="botoes">
      <button class="button login" onclick="entrar()"><a href="index.html">Entrar</a></button>
      <div class="icone-texto">
        <a href="cadastro.html" class="button cadastro"> <img class="icon" src="./img/user2.png"/> Criar Cadastro</a>
      </div>  
      <p class="link-esqueci">Esqueci a minha senha</p>
    </div>
  </div>
  <p class="rodape">São Paulo - SP • 2026</p> 
</body>
</html>
