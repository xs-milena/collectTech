<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="style-registro.css">
</head>

<body>
    <div class="Titulo">
        Criação de usuario
    </div>
    <div class="card">
        <div class="Fonte">
            <div class="input">
                <div class="nome">
                    <input type="text" id="ipt_nome_usuario" required>
                    <label>Digite o nome de usuario</label>
                </div>
                <div class="email">
                    <input type="text" id="ipt_email" required>
                    <label>Digite o email</label>
                </div>
                <div class="senha">
                    <input type="text" id="ipt_senha" required>
                    <label>Insira a senha</label>
                </div>
                <div class="confirmacao">
                    <input type="text" id="ipt_confirmaçao_senha" required>
                    <label>Confirme a senha</label>
                </div>
            </div>
            <div class="botão_insercao">
                <button onclick="">Confirmar</button>
            </div>
        </div>
    </div>
</body>

</html>
