<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style-login.css">
</head>

<body>
    <div class="Titulo">
        Login
    </div>
    <div class="card">
        <div class="Fonte">
            <div class="input">
                <div class="email">
                    <input type="text" id="ipt_email" required>
                    <label>Digite o email do usuario</label>
                </div>
                <div class="senha">
                    <input type="text" id="ipt_senha" required>
                    <label>Insira a senha</label>
                </div>
            </div>
        </div>
        <div class="botão_insercao">
            <button onclick="">Confirmar</button>
        </div>
    </div>
    </div>
</body>

</html>
