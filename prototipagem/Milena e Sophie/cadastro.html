<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collect Tech</title>
    <link rel="stylesheet" href="styles.css"> 
     <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
</head>
<body>
  

<div class="fonte-tudo">
    
  <div class="container">
    <div class="container2">
    <div class="logo"><img src="./img/logo.png" alt="Logo da Collect Tech"></div>
    <div class="criarcadastro">Criar Cadastro</div>
    <div class="sistema">Sistema Collect Tech - Smart City Solution</div>
</div>
    <div class="cadastro">
      <div class="campo-grupo">
        <label ><span class="material-symbols-outlined iconeverde">person</span> Nome Completo *</label>
        <input class='caixinha' class="nomecompleto" type="text" placeholder="Digite seu nome completo">
      </div>

      <div class="linha-dupla">
        <div class="campo-grupo">
          <label ><span class="material-symbols-outlined iconeverde">mail</span> E-mail *</label>
          <input class='caixinha' class='email' type="email" placeholder="seu@email.com">
        </div>
        <div class="campo-grupo">
          <label ><span class="material-symbols-outlined iconeverde">phone</span> Telefone *</label>
          <input class='caixinha' class='telefone' type="text" placeholder="(11) 99999-9999">
        </div>
      </div>

      <div class="campo-grupo">
        <label ><span class="material-symbols-outlined iconeverde">work</span> Cargo *</label>
        <input class='caixinha' class='cargo' type="text" placeholder="Ex: Gestor Ambiental, Coordenador, Analista...">
      </div>

      <div class="linha-dupla">
        <div class="campo-grupo">
          <label><span class="material-symbols-outlined iconeverde">lock</span> Senha *</label>
          <input class='caixinha' class='senha' type="text" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="campo-grupo">
          <label><span class="material-symbols-outlined iconeverde">lock</span> Confirmar Senha *</label>
          <input class='caixinha' class='senhaconfirmar' type="text" placeholder="Digite novamente">
        </div>
      </div>
 <div class="caixinha2">
      <div class="info-imp">Informações importantes:</div>
      <ul class="lista-info">
        <li>A senha deve ter no mínimo 6 caracteres</li>
        <li>Após o cadastro, você será redirecionado para a tela de login</li>
        <li>Todos os campos são obrigatórios</li>
      </ul>
    </div>
      <button class="botao-cadastro"><a href="cadastro.html">Cadastrar</a></button>
       <button class="voltar-login"><a href="login.html">Voltar para o Login</a></button>
    </div>

    <div class="secao-login">
      <p>Já possui cadastro? <a href="login.html" id="facaloginaqui">Faça login aqui</a></p>
    </div>
   
  </div>
</div>
    </div>
    </div>


</body>
</html>
