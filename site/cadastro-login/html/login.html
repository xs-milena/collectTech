<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="cabecalho">
        <img src="../img/folha.png" alt="" class="icone">
        <h1>Collect Tech</h1>
        <span>Gestão Inteligente de Resíduos Urbanos</span>
    </div>

    <div class="container">
        <div class="card">
            <form type="text" action="#" method="post" name="form">
                <div>
                    <p>E-mail:</p>
                    <input type="email" name="email" placeholder="seu@email.com" required class="campo-login">
                </div>
                <div>
                    <p>Senha:</p>
                    <input type="password" name="senha" minlength="6" placeholder="......" required class="campo-login">
                </div>
                <div>
                    <input type="submit" name="login" value="Entrar" class="botao">
                </div>
                <div>
                    <a href="../cadastro.html"><button class="botao2"><img src="../img/cadastro.png" alt=""
                                class="img-botao">Criar cadastro</button></a>
                </div>
                <div>
                    <a href="" class="link">Esqueci minha senha</a>
                </div>
            </form>
        </div>



        <div class="extra">
            <span>São Paulo - SP · 2026</span>
        </div>
    </div>

</body>

</html>
